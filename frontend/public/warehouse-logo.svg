<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <g fill="#1e3a5f">
    <!-- Ground line -->
    <rect x="20" y="340" width="720" height="5" rx="2"/>
    
    <!-- Main warehouse body -->
    <path d="M40,340 L40,200 C40,195 45,190 50,188 L240,110 L430,55 L450,55 L450,340 Z"/>
    
    <!-- Roof highlight stripe -->
    <path d="M240,110 L430,55 L450,55 L440,68 L245,120 Z" fill="#ffffff"/>
    
    <!-- Silo 1 (leftmost, shortest) -->
    <path d="M65,340 L65,195 Q85,165 105,195 L105,340 Z"/>
    <rect x="80" y="155" width="10" height="22" rx="2"/>
    <line x1="65" y1="195" x2="65" y2="340" stroke="#ffffff" stroke-width="4"/>
    
    <!-- Silo 2 -->
    <path d="M115,340 L115,180 Q135,148 155,180 L155,340 Z"/>
    <rect x="130" y="138" width="10" height="22" rx="2"/>
    <line x1="115" y1="180" x2="115" y2="340" stroke="#ffffff" stroke-width="4"/>
    
    <!-- Silo 3 -->
    <path d="M165,340 L165,165 Q185,132 205,165 L205,340 Z"/>
    <rect x="180" y="122" width="10" height="22" rx="2"/>
    <line x1="165" y1="165" x2="165" y2="340" stroke="#ffffff" stroke-width="4"/>
    
    <!-- Silo 4 (tallest) -->
    <path d="M215,340 L215,150 Q235,118 255,150 L255,340 Z"/>
    <rect x="230" y="108" width="10" height="22" rx="2"/>
    <line x1="215" y1="150" x2="215" y2="340" stroke="#ffffff" stroke-width="4"/>
    
    <!-- Loading dock lines on main building -->
    <rect x="470" y="195" width="90" height="14" rx="2" fill="#ffffff"/>
    <rect x="470" y="218" width="90" height="14" rx="2" fill="#ffffff"/>
    <rect x="470" y="241" width="90" height="14" rx="2" fill="#ffffff"/>
    
    <!-- Small side building -->
    <path d="M580,340 L580,200 L640,155 L700,200 L700,340 Z"/>
    
    <!-- Side building roof chevron -->
    <path d="M610,175 L640,148 L670,175 Z" fill="#ffffff"/>
    
    <!-- Side building dock lines -->
    <rect x="598" y="255" width="84" height="12" rx="2" fill="#ffffff"/>
    <rect x="598" y="275" width="84" height="12" rx="2" fill="#ffffff"/>
  </g>
</svg>
